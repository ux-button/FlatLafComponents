# Custom FlatLaf theme (Light) - generated from provided design tokens
# Docs:
# - https://www.formdev.com/flatlaf/properties-files/
# - https://www.formdev.com/flatlaf/client-properties/
# - https://www.formdev.com/flatlaf/components/borders/

@baseTheme = light

# ----------------------------------------------------------------------
# COLOR TOKENS
# ----------------------------------------------------------------------
Custom.neutral_100 = #121a36
Custom.neutral_80  = #41485e
Custom.neutral_60  = #717686
Custom.neutral_40  = #a0a3ae
Custom.neutral_30  = #b8bac3
Custom.neutral_20  = #d0d1d7
Custom.neutral_10  = #e5e9ef
Custom.neutral_5   = #f3f4f5
Custom.neutral_0   = #ffffff

Custom.brand_110 = #0068e3
Custom.brand_100 = #0073fc
Custom.brand_40  = #96c6fe
Custom.brand_20  = #d1e6fe
Custom.brand_10  = #e0eeff
Custom.brand_5   = #ebf4ff
Custom.brand_0   = #f7fbff

Custom.tag_red_accent           = #da232a
Custom.tag_red_background       = #ffd6da
Custom.tag_magenta_accent       = #c12468
Custom.tag_magenta_background   = #fed5e7
Custom.tag_orange_accent        = #e46514
Custom.tag_orange_background    = #ffe6d6
Custom.tag_yellow_accent        = #fac800
Custom.tag_yellow_background    = #ffffd6
Custom.tag_purple_accent        = #6929c5
Custom.tag_purple_background    = #f6f0ff
Custom.tag_ultramarine_accent   = #0948d0
Custom.tag_ultramarine_background = #ebf2ff
Custom.tag_cobalt_accent        = #08859e
Custom.tag_cobalt_background    = #e5fbff
Custom.tag_turquoise_accent     = #076244
Custom.tag_turquoise_background = #e0fff5
Custom.tag_green_accent         = #158338
Custom.tag_green_background     = #e0ffe8

# ----------------------------------------------------------------------
# BASE + typography
# - Icon: 16x16
# - Left/right padding 4
# - Base text line-height 16; with top/bottom 4 => control height 24
# ----------------------------------------------------------------------
defaultFont = Tahoma 14
Component.arc = 8
Component.focusWidth = 2
Component.innerFocusWidth = 0
Component.borderWidth = 1

Component.foreground = $Custom.neutral_100
Component.borderColor = $Custom.neutral_10
Component.disabledBorderColor = $Custom.neutral_20
Component.disabledForeground = $Custom.neutral_40
Component.focusColor = $Custom.brand_100
Component.hoverBorderColor = $Custom.neutral_20
Component.arrowType = chevron

# Error/Warning outlines (used via client property JComponent.outline = "error"/"warning")
Component.error.focusedBorderColor = $Custom.tag_red_accent
Component.error.borderColor = desaturate($Component.error.focusedBorderColor,25%)
Component.warning.focusedBorderColor = $Custom.tag_yellow_accent
Component.warning.borderColor = desaturate($Component.warning.focusedBorderColor,25%)

# App surfaces
Panel.background = $Custom.neutral_0
Viewport.background = $Custom.neutral_0
ScrollPane.background = $Custom.neutral_0
ScrollPane.border = 0,0,0,0

# ----------------------------------------------------------------------
# TEXT FIELDS (single-line / password / formatted)
# ----------------------------------------------------------------------
TextField.caretForeground = $Custom.neutral_100
TextField.placeholderForeground = $Custom.neutral_40
TextField.background = $Custom.neutral_0
TextField.foreground = $Custom.neutral_100
TextField.borderColor = $Custom.neutral_10
TextField.selectionBackground = $Custom.brand_20
TextField.selectionForeground = $Custom.neutral_100
TextField.inactiveBackground = $Custom.neutral_0
TextField.inactiveForeground = $Custom.neutral_100
TextField.inactiveBorderColor = $Custom.neutral_10
TextField.hoverBackground = $Custom.neutral_0
TextField.hoverForeground = $Custom.neutral_100
TextField.hoverBorderColor = $Custom.neutral_20
TextField.disabledBackground = $Custom.neutral_5
TextField.disabledForeground = $Custom.neutral_40
TextField.disabledBorderColor = $Custom.neutral_20
TextField.font = Tahoma 12
TextField.margin = 4,8,4,8
TextField.minimumHeight = 24
TextField.minimumWidth = 180

FormattedTextField.caretForeground = $Custom.neutral_100
FormattedTextField.placeholderForeground = $Custom.neutral_40
FormattedTextField.background = $Custom.neutral_0
FormattedTextField.foreground = $Custom.neutral_100
FormattedTextField.borderColor = $Custom.neutral_10
FormattedTextField.selectionBackground = $Custom.brand_20
FormattedTextField.selectionForeground = $Custom.neutral_100
FormattedTextField.inactiveBackground = $Custom.neutral_0
FormattedTextField.inactiveForeground = $Custom.neutral_100
FormattedTextField.inactiveBorderColor = $Custom.neutral_10
FormattedTextField.hoverBackground = $Custom.neutral_0
FormattedTextField.hoverForeground = $Custom.neutral_100
FormattedTextField.hoverBorderColor = $Custom.neutral_20
FormattedTextField.disabledBackground = $Custom.neutral_5
FormattedTextField.disabledForeground = $Custom.neutral_40
FormattedTextField.disabledBorderColor = $Custom.neutral_20
FormattedTextField.font = $TextField.font
FormattedTextField.margin = $TextField.margin
FormattedTextField.minimumHeight = $TextField.minimumHeight

PasswordField.caretForeground = $Custom.neutral_100
PasswordField.placeholderForeground = $Custom.neutral_40
PasswordField.background = $Custom.neutral_0
PasswordField.foreground = $Custom.neutral_100
PasswordField.borderColor = $Custom.neutral_10
PasswordField.selectionBackground = $Custom.brand_20
PasswordField.selectionForeground = $Custom.neutral_100
PasswordField.inactiveBackground = $Custom.neutral_0
PasswordField.inactiveForeground = $Custom.neutral_100
PasswordField.inactiveBorderColor = $Custom.neutral_10
PasswordField.hoverBackground = $Custom.neutral_0
PasswordField.hoverForeground = $Custom.neutral_100
PasswordField.hoverBorderColor = $Custom.neutral_20
PasswordField.disabledBackground = $Custom.neutral_5
PasswordField.disabledForeground = $Custom.neutral_40
PasswordField.disabledBorderColor = $Custom.neutral_20
PasswordField.font = $TextField.font
PasswordField.margin = $TextField.margin
PasswordField.minimumHeight = $TextField.minimumHeight
PasswordField.font = $TextField.font
PasswordField.margin = $TextField.margin
PasswordField.minimumHeight = $TextField.minimumHeight

# Reveal button in password field (FlatLaf client property)
PasswordField.showRevealButton = true

# ----------------------------------------------------------------------
# TEXT AREA (multiline)
# ----------------------------------------------------------------------
TextArea.caretForeground = $Custom.neutral_100
TextArea.placeholderForeground = $Custom.neutral_40
TextArea.background = $Custom.neutral_0
TextArea.foreground = $Custom.neutral_100
TextArea.borderColor = $Custom.neutral_10
TextArea.selectionBackground = $Custom.brand_20
TextArea.selectionForeground = $Custom.neutral_100
TextArea.inactiveBackground = $Custom.neutral_0
TextArea.inactiveForeground = $Custom.neutral_100
TextArea.inactiveBorderColor = $Custom.neutral_10
TextArea.hoverBackground = $Custom.neutral_0
TextArea.hoverForeground = $Custom.neutral_100
TextArea.hoverBorderColor = $Custom.neutral_20
TextArea.disabledBackground = $Custom.neutral_5
TextArea.disabledForeground = $Custom.neutral_40
TextArea.disabledBorderColor = $Custom.neutral_20
TextArea.margin = 4,8,4,8

# ----------------------------------------------------------------------
# COMBOBOX / SPINNER (used for "Num input")
# ----------------------------------------------------------------------
ComboBox.caretForeground = $Custom.neutral_100
ComboBox.placeholderForeground = $Custom.neutral_40
ComboBox.background = $Custom.neutral_0
ComboBox.foreground = $Custom.neutral_100
ComboBox.borderColor = $Custom.neutral_10
ComboBox.selectionBackground = $Custom.brand_20
ComboBox.selectionForeground = $Custom.neutral_100
ComboBox.inactiveBackground = $Custom.neutral_0
ComboBox.inactiveForeground = $Custom.neutral_100
ComboBox.inactiveBorderColor = $Custom.neutral_10
ComboBox.hoverBackground = $Custom.neutral_0
ComboBox.hoverForeground = $Custom.neutral_100
ComboBox.hoverBorderColor = $Custom.neutral_20
ComboBox.disabledBackground = $Custom.neutral_5
ComboBox.disabledForeground = $Custom.neutral_40
ComboBox.disabledBorderColor = $Custom.neutral_20
ComboBox.font = $TextField.font
ComboBox.margin = 4,8,4,8
ComboBox.minimumHeight = 24
ComboBox.minimumWidth = 180

ComboBox.buttonBackground = $Custom.neutral_0
ComboBox.buttonHoverBackground = $Custom.brand_5
ComboBox.buttonPressedBackground = $Custom.brand_20
ComboBox.buttonStyle = button
ComboBox.buttonSeparatorWidth = 0
ComboBox.padding = 4,4,4,4
ComboBox.minimumHeight = $TextField.minimumHeight

Spinner.background = $Custom.neutral_0
Spinner.foreground = $Custom.neutral_100
Spinner.font = $TextField.font
Spinner.buttonBackground = $Custom.neutral_0
Spinner.buttonHoverBackground = $Custom.neutral_5
Spinner.buttonPressedBackground = $Custom.neutral_10
Spinner.padding = 4,4,4,4
Spinner.minimumHeight = $TextField.minimumHeight

# ----------------------------------------------------------------------
# BUTTONS
# ----------------------------------------------------------------------
Button.arc = 8
Button.margin = 4,8,4,8
Button.minimumHeight = 32
Button.iconTextGap = 4
Button.background = $Custom.neutral_0
Button.foreground = $Custom.neutral_100
Button.borderColor = $Custom.neutral_20
Button.inactiveBackground = $Custom.brand_100
Button.hoverBackground = $Custom.brand_0
Button.hoverBorderColor = $Custom.neutral_30
Button.pressedBackground = $Custom.brand_5
Button.pressedBorderColor = $Custom.neutral_40
Button.disabledBackground = null
Button.disabledText = $Custom.neutral_40

# Primary / Secondary / Ghost styles via style classes
[style]Button.primary = borderColor: $Custom.brand_100; background: $Custom.brand_100; foreground: $Custom.neutral_0; \
    hoverBackground: $Custom.brand_110; pressedBackground: $Custom.brand_110

[style]Button.secondary = borderColor: $Custom.neutral_20; background: $Custom.neutral_0; foreground: $Custom.neutral_100; \
    hoverBackground: $Custom.neutral_5; pressedBackground: $Custom.neutral_10

[style]Button.ghost = borderColor: null; background: $Custom.brand_5; foreground: $Custom.brand_100; \
    hoverBackground: $Custom.brand_10; pressedBackground: $Custom.brand_20

[style]Button.iconOnly = margin: 6,6,6,6; minimumWidth: 28

# ----------------------------------------------------------------------
# CHECKBOX
# ----------------------------------------------------------------------
CheckBox.icon.style = outlined
CheckBox.icon.borderColor = $Custom.neutral_20
CheckBox.icon.background = $Custom.neutral_0
CheckBox.icon.hoverBorderColor = $Custom.neutral_40
CheckBox.icon.focusedBackground = $Custom.neutral_0
CheckBox.icon.focusedSelectedBackground = $Custom.brand_100
CheckBox.icon.focusedHoverBackground = $Custom.brand_100
CheckBox.icon.inactiveBackground = $Custom.neutral_0
CheckBox.icon.inactiveFocusedBackground = $Custom.brand_100
CheckBox.icon.selectedBorderColor = $Custom.brand_100
CheckBox.icon.selectedBackground = $Custom.brand_100
CheckBox.icon.checkmarkColor = $Custom.neutral_0
CheckBox.icon.indeterminateBorderColor = $Custom.brand_100
CheckBox.icon.indeterminateBackground = $Custom.brand_100
CheckBox.icon.indeterminateCheckmarkColor = $Custom.neutral_0

CheckBox.icon.disabledBorderColor = $Custom.neutral_20
CheckBox.icon.disabledBackground = $Custom.neutral_5
CheckBox.icon.disabledSelectedBorderColor = $Custom.neutral_20
CheckBox.icon.disabledSelectedBackground = $Custom.neutral_20
CheckBox.icon.disabledCheckmarkColor = $Custom.neutral_0
CheckBox.iconTextGap = 4
CheckBox.margin = 4,0,4,0
CheckBox.icon.borderWidth = 1
CheckBox.icon.selectedBorderWidth = 1
CheckBox.icon.focusWidth = 1
CheckBox.icon.arc = 8

# ----------------------------------------------------------------------
# LABELS (for "Label" above fields)
# ----------------------------------------------------------------------
Label.foreground = $Custom.neutral_80
Label.disabledForeground = $Custom.neutral_40

# ----------------------------------------------------------------------
# PROGRESS BAR
# ----------------------------------------------------------------------
ProgressBar.arc = 8
ProgressBar.background = $Custom.brand_5
ProgressBar.foreground = $Custom.brand_100
ProgressBar.borderColor = $Custom.brand_10

# ======================================================================
# EXTRA SECTIONS (explicitly requested): tabs, tables, calendars, dropdowns, tags
# Notes:
# - FlatLaf safely ignores unknown keys, so this file can include “future keys”
#   that you may later wire in via custom components/renderers.
# ======================================================================

# ----------------------------------------------------------------------
# DROPDOWNS / COMBOBOX / POPUP
# ----------------------------------------------------------------------
ComboBox.selectionBackground = $Custom.brand_5
ComboBox.selectionForeground = $Custom.neutral_100
ComboBox.disabledBackground = $Custom.neutral_5
ComboBox.disabledForeground = $Custom.neutral_40
ComboBox.hoverBackground = $Custom.neutral_0
ComboBox.hoverBorderColor = $Custom.neutral_30
ComboBox.focusedBorderColor = $Custom.brand_100

# Popup list that appears under combobox
ComboBox.popupBackground = $Custom.neutral_0
ComboBox.popupBorderColor = null
ComboBox.popupInsets = 0,0,0,0
ComboBox.popupSelectionBackground = $Custom.brand_5
ComboBox.popupSelectionForeground = $Custom.neutral_100

# “Selectbox / multiselect” popups use PopupMenu + List defaults
PopupMenu.background = $Custom.neutral_0
PopupMenu.foreground = $Custom.neutral_100
PopupMenu.borderColor = null
PopupMenu.borderInsets = 0,0,0,0

MenuItem.background = $Custom.neutral_0
MenuItem.foreground = $Custom.neutral_100
MenuItem.hoverBackground = $Custom.brand_5
MenuItem.selectionBackground = $Custom.brand_10
MenuItem.selectionForeground = $Custom.neutral_100
MenuItem.disabledForeground = $Custom.neutral_40
MenuItem.margin = 4,4,4,4

# ----------------------------------------------------------------------
# TABLES (Table Samples / Table Header Items / Table Content Items)
# ----------------------------------------------------------------------
Table.background = $Custom.neutral_0
Table.foreground = $Custom.neutral_100
Table.selectionBackground = $Custom.brand_20
Table.selectionForeground = $Custom.neutral_100
Table.selectionInactiveBackground = $Custom.brand_5
Table.selectionInactiveForeground = $Custom.neutral_100
Table.gridColor = $Custom.neutral_5
Table.alternateRowColor = $Custom.neutral_0
Table.rowHeight = 40
Table.showHorizontalLines = true
Table.showVerticalLines = false
Table.intercellSpacing = 1

TableHeader.background = $Custom.neutral_0
TableHeader.foreground = $Custom.neutral_60
TableHeader.separatorColor = $Custom.neutral_10
TableHeader.bottomSeparatorColor = $Custom.neutral_10
TableHeader.height = 40
TableHeader.cellBorder = 0,0,1,0,$Custom.neutral_10

# ----------------------------------------------------------------------
# TABS
# ----------------------------------------------------------------------
TabbedPane.tabHeight = 32
TabbedPane.tabInsets = 6,14,6,14
TabbedPane.tabAreaInsets = 6,6,6,6
TabbedPane.background = $Custom.neutral_0
TabbedPane.foreground = $Custom.neutral_100
TabbedPane.selectedBackground = $Custom.brand_5
TabbedPane.selectedForeground = $Custom.brand_100
TabbedPane.hoverBackground = $Custom.neutral_0
TabbedPane.hoverForeground = $Custom.brand_100
TabbedPane.disabledForeground = $Custom.neutral_40
TabbedPane.underlineColor = $Custom.brand_100
TabbedPane.inactiveUnderlineColor = $Custom.neutral_10
TabbedPane.contentAreaColor = $Custom.neutral_0

# ----------------------------------------------------------------------
# TOOLBAR
# ----------------------------------------------------------------------
ToolBar.background = $Custom.neutral_0
ToolBar.foreground = $Custom.neutral_100

# ----------------------------------------------------------------------
# CALENDAR / DATE PICKER
# FlatLaf itself doesn't ship a “calendar” component, so the theme here
# styles the primitives you typically use to build one:
# - TextField (date input)
# - PopupMenu (calendar popup)
# - Spinner (year/month)
# - Toolbar-like small buttons (day cells)
# ----------------------------------------------------------------------
# Date field (already covered by TextField.* above; duplicated for clarity)
DatePicker.fieldBackground = $TextField.background
DatePicker.fieldForeground = $TextField.foreground
DatePicker.fieldPlaceholderForeground = $TextField.placeholderForeground
DatePicker.fieldBorderColor = $Component.borderColor
DatePicker.fieldFocusedBorderColor = $Component.focusColor

# Calendar popup surface
DatePicker.popupBackground = $PopupMenu.background
DatePicker.popupBorderColor = $PopupMenu.borderColor
DatePicker.popupShadowColor = rgba(0,0,0,12%)

# Year/month spinners inside popup
DatePicker.spinnerBackground = $Spinner.background
DatePicker.spinnerButtonHoverBackground = $Spinner.buttonHoverBackground

# Day-cell buttons (you may apply these via client property STYLE_CLASS)
[style]Button.calendarDay = arc: 8; margin: 2,6,2,6; background: $Custom.neutral_0; foreground: $Custom.neutral_100; borderColor: null
[style]Button.calendarDay.hover = background: $Custom.brand_10
[style]Button.calendarDay.selected = background: $Custom.brand_100; foreground: $Custom.neutral_0

# ----------------------------------------------------------------------
# TAGS / PILLS
# Note: “Tag” in your gallery is a custom component; FlatLaf can't style it
# directly unless you implement it as a JButton/Label. These tokens are here
# so you can reference them consistently.
# ----------------------------------------------------------------------
Custom.tag_default_bg = $Custom.neutral_10
Custom.tag_default_fg = $Custom.neutral_60
Custom.tag_outline_border = $Custom.neutral_20

# Status pill tokens used by table renderers
Custom.status_in_progress_bg = $Custom.brand_10
Custom.status_in_progress_fg = $Custom.brand_100
Custom.status_complete_bg = $Custom.tag_green_background
Custom.status_complete_fg = $Custom.tag_green_accent
Custom.status_hold_bg = $Custom.neutral_10
Custom.status_hold_fg = $Custom.neutral_60



# Aliases to make style classes easier to apply in code
[style]Button.calendarDaySelected = arc: 8; margin: 2,6,2,6; background: $Custom.brand_100; foreground: $Custom.neutral_0; borderColor: null
[style]Button.calendarDayHover = arc: 8; margin: 2,6,2,6; background: $Custom.brand_10; foreground: $Custom.neutral_100; borderColor: null

# Lists / Trees
List.background = $Custom.neutral_0
List.foreground = $Custom.neutral_100
List.selectionBackground = $Custom.brand_20
List.selectionForeground = $Custom.neutral_100
List.selectionInactiveBackground = $Custom.brand_5
List.selectionInactiveForeground = $Custom.neutral_100
List.cellMargins = 4,4,4,4
List.rowHeight = 24

Tree.background = $Custom.neutral_0
Tree.foreground = $Custom.neutral_100
Tree.selectionBackground = $Custom.brand_20
Tree.selectionForeground = $Custom.neutral_100
Tree.selectionInactiveBackground = $Custom.neutral_10
Tree.selectionInactiveForeground = $Custom.neutral_100
Tree.rowHeight = 28

# Scroll bars
ScrollBar.thumb = $Custom.neutral_10
ScrollBar.thumbHover = $Custom.brand_100
ScrollBar.track = $Custom.neutral_0
ScrollBar.width = 12
